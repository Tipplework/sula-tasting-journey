<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/wine-glass.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Sula Interactive Wine Flight</title>
    <meta name="description" content="Your self-guided premium wine tasting journey at Sula Vineyards." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="preload" href="/sula-logo.png" as="image" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #f8f5f0;
        overflow-x: hidden;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      #root {
        min-height: 100vh;
        width: 100%;
        max-width: 100vw;
        background: #f8f5f0;
      }
      #app-splash {
        position: fixed;
        inset: 0;
        background: #f8f5f0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease 0.4s;
        padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      }
      #app-splash img {
        width: 140px;
        height: auto;
        max-width: 60vw;
        animation: splashPulse 1.6s ease-in-out infinite;
      }
      #app-splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      @keyframes splashPulse {
        0%, 100% { opacity: 0.95; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.03); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-splash" aria-hidden="true">
      <img src="/sula-logo.png" alt="" />
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var s = document.getElementById('app-splash');
          if (s) {
            s.classList.add('hide');
            setTimeout(function () { s && s.remove(); }, 1200);
          }
        }, 300);
      });
    </script>
  </body>
</html>
